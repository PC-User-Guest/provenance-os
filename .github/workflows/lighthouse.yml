name: Lighthouse Audit

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tooling
        run: npm install --no-save http-server lighthouse start-server-and-test

      - name: Run Lighthouse against local site
        run: npx start-server-and-test "npx http-server . -p 4173 --silent" http://127.0.0.1:4173 "npx lighthouse http://127.0.0.1:4173 --output=json --output-path=lighthouse.json --quiet --chrome-flags=\"--headless --no-sandbox --disable-gpu\""

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse.json